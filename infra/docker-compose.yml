services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../apps/api/.env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ../apps/api/.env
    depends_on:
      redis:
        condition: service_healthy

  # Celery beat — fires the cadence engine (send_due_followups every 30 min,
  # close_stale_followups nightly). Without this service no followup is ever sent.
  beat:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: celery -A src.tasks.celery_app beat --loglevel=info
    env_file:
      - ../apps/api/.env
    depends_on:
      redis:
        condition: service_healthy
