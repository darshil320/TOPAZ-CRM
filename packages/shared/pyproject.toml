[project]
name = "topaz-shared"
version = "0.1.0"
description = "Shared contracts for Topaz CRM services."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8,<3.0",
]

[build-system]
requires = ["setuptools>=70.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
